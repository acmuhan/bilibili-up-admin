services:
  bilibili-up-admin:
    # 使用 GitHub Container Registry 镜像
    image: ghcr.io/acmuhan/bilibili-up-admin:latest
    container_name: bilibili-up-admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 🌟 核心修正：同样挂载到 /home/appuser/data
      - ./data:/home/appuser/data
    environment:
      - TZ=Asia/Shanghai
